# Default webserv configuration
# Binds to all interfaces on port 8080
# Relative paths resolve from the working directory where webserv is started

server {
    listen 0.0.0.0:8080;

    root www/;
    index index.html;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        autoindex off;
    }
}
