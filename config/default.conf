# Default webserv configuration
# Binds to all interfaces on port 8080
# Relative paths resolve from the working directory where webserv is started

server {
    listen 8080;
    server_name localhost webserv;
    
    root www/;
    index index.html;
    client_max_body_size 5M;
    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    # Rules for root: Only GET, no autoindex
    location / {
        limit_except GET;
        autoindex off;
    }

    # Local with POST and DELETE allowed, Autoindex enabled
    location /imagens {
        limit_except GET POST DELETE;
        autoindex on;
    }

    # Upload configuration 
    location /upload {
        limit_except POST;
        upload_store /tmp/uploads;
    }
}